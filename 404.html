<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>

<script>
(function () {

  var path = window.location.pathname.toLowerCase();

  /* allow real website pages */
  if (
    path === "/privacy" ||
    path === "/privacy/" ||
    path === "/support" ||
    path === "/support/" ||
    path === "/imprint" ||
    path === "/imprint/"
  ) {
    window.location.replace(path.replace(/\/$/, ""));
    return;
  }

  /* everything else goes to homepage */
  window.location.replace("/");

})();
</script>

</head>

<body>
Redirecting...
</body>
</html>
