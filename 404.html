<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>

<script>
(function () {

  var path = window.location.pathname;

  /* only handle app deep links */
  if (
    path.startsWith("/sublet/") ||
    path.startsWith("/community/") ||
    path.startsWith("/reset-password")
  ) {
    window.location.replace("/");
    return;
  }

})();
</script>

</head>

<body></body>
</html>
