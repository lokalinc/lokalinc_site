<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>

<script>
(function () {

  var path = window.location.pathname.toLowerCase();

  /* allow real pages */
  if (
    path === "/privacy.html" ||
    path === "/support.html" ||
    path === "/imprint.html"
  ) {
    return;
  }

  /* handle app links */
  if (
    path.startsWith("/sublet/") ||
    path.startsWith("/community/") ||
    path.startsWith("/reset-password")
  ) {
    window.location.replace("/");
    return;
  }

})();
</script>

</head>

<body>
</body>
</html>
